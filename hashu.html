<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR HASHUU | Access Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        :root {
            --bg: #020408;
            --primary: #ff0055;
            --secondary: #7000ff;
            --accent: #00f2ff;
            --glass: rgba(15, 18, 25, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(135deg, #ff0055 0%, #7000ff 50%, #00f2ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            width: 100%; min-height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: #fff; 
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }

        .container {
            position: relative; z-index: 10;
            width: 95%; max-width: 450px;
            padding: 20px 0;
            animation: fadeIn 1s ease-out;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 40px 25px;
            backdrop-filter: blur(30px);
            box-shadow: 0 30px 100px rgba(0,0,0,0.9);
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-section { margin-bottom: 30px; }
        .header-section h1 {
            font-weight: 800; font-size: 35px;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }
        .header-section p { font-size: 10px; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; font-weight: 600; margin-top: 5px; }

        .form-stack { display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; }

        .input-group { text-align: left; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 11px; font-weight: 700; color: #94a3b8; margin-left: 12px; display: flex; align-items: center; gap: 8px; }
        .input-group label i { color: var(--primary); font-size: 13px; }

        input {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            padding: 15px 20px; border-radius: 18px;
            color: #fff; font-size: 14px; outline: none;
            transition: all 0.3s ease;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); transform: translateY(-2px); }

        .btn-access {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: var(--grad); color: #fff; font-weight: 800;
            font-size: 16px; cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 40px rgba(255, 0, 85, 0.3);
        }
        .btn-access:hover { filter: brightness(1.2); transform: scale(1.02); box-shadow: 0 15px 50px rgba(255, 0, 85, 0.5); }

        .glow { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.25; }
        .glow-1 { width: 300px; height: 300px; background: var(--primary); top: -50px; right: -50px; }
        .glow-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; left: -50px; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="container">
    <div class="login-card animate__animated animate__zoomIn">
        <div class="header-section">
            <h1 class="animate__animated animate__pulse animate__infinite">MR HASHUU</h1>
            <p>Verification Required</p>
        </div>

        <form id="accessForm">
            <div class="form-stack">
                <div class="input-group">
                    <label><i class="fas fa-key"></i> ACCESS KEY</label>
                    <input type="text" id="code" placeholder="HASH-XXXXXX" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-user"></i> FULL NAME</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-calendar-alt"></i> AGE</label>
                    <input type="number" id="age" placeholder="How old are you?" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-user-tag"></i> NICKNAME</label>
                    <input type="text" id="nick" placeholder="Alias / Handle" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-laptop-code"></i> PLATFORM</label>
                    <input type="text" id="platform" placeholder="e.g. Android, Windows, iOS" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-target-cell"></i> PURPOSE</label>
                    <input type="text" id="purpose" placeholder="Why do you need access?" required>
                </div>
            </div>

            <button type="submit" class="btn-access">
                UNLOCK SYSTEM <i class="fas fa-shield-halved"></i>
            </button>
        </form>

        <p style="margin-top: 30px; font-size: 11px; color: #64748b; font-weight: 600;">
            SECURED BY <span style="color: var(--primary);">MR HASHUU</span> PROTECTION
        </p>
    </div>
</div>

<script>
    // Particles setup
    if(typeof particlesJS !== 'undefined'){
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#7000ff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "out_mode": "out" }
            }
        });
    }

    document.getElementById('accessForm').onsubmit = function(e) {
        e.preventDefault();
        
        const key = document.getElementById('code').value.trim();
        // Redirect ලින්ක් එක පහතින්
        const mainURL = "https://hashan-md-ofc-sawii.github.io/hide-jscodes/hashuu.html"; 

        if(key.includes("HASH-") || key === "ADMIN") {
            Swal.fire({
                title: 'Accessing...',
                html: 'Establishing secure tunnel to the vault.',
                timer: 2000,
                timerProgressBar: true,
                background: '#020408',
                color: '#fff',
                didOpen: () => { Swal.showLoading() }
            }).then(() => {
                // සත්‍යාපනය සාර්ථක බව සටහන් කිරීම
                localStorage.setItem('auth_success', 'true');
                
                // වඩාත් ශක්තිමත් Redirect ක්‍රමය
                window.top.location.replace(mainURL);
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Invalid Key',
                text: 'Access Denied. Please use a valid key.',
                background: '#020408',
                color: '#fff',
                confirmButtonColor: '#ff0055'
            });
        }
    };
</script>

</body>
</html>
